<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login - Sistema Comercial de Controle de Produtos e Caixa" />
  <title>Login | Sistema Comercial</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>🏪 ComércioApp</h1>
        <p>Sistema de controle comercial</p>
      </div>

      <form id="form-login" novalidate>
        <div class="campo" style="margin-bottom:1rem">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="campo" style="margin-bottom:1.5rem">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        <div id="feedback" style="margin-top:0.875rem;text-align:center;font-size:0.875rem;color:var(--vermelho);min-height:1.25rem"></div>
      </form>
    </div>
  </div>

  <script>
    // Redireciona se já logado
    if (localStorage.getItem('token')) location.href = '/index.html';

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fb = document.getElementById('feedback');
      fb.textContent = '';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (!res.ok) { fb.textContent = data.erro; return; }

        localStorage.setItem('token',   data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        location.href = '/index.html';
      } catch {
        fb.textContent = 'Erro de conexão com o servidor.';
      }
    });
  </script>
</body>
</html>
